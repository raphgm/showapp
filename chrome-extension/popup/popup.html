<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Show</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <!-- Floating Label -->
    <div class="pill-label-badge" id="pillLabel">
      <svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor">
        <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
      </svg>
      <span class="pill-label-text">SHOW PILL</span>
    </div>

    <!-- Main Pill Container -->
    <div class="pill-main">
      <!-- Header Row -->
      <div class="pill-header">
        <div class="header-left">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="white">
              <path d="M5.5 4.866a1.5 1.5 0 0 1 2.227-1.313l13.5 7.42a1.5 1.5 0 0 1 0 2.626l-13.5 7.42A1.5 1.5 0 0 1 5.5 19.706V4.866Z"/>
            </svg>
          </div>
          <span class="header-title">Show</span>
        </div>
        <div class="status-indicator">
          <div class="status-dot" id="statusDot"></div>
          <span class="status-text" id="tabHost">Ready</span>
        </div>
      </div>

      <!-- Divider -->
      <div class="pill-divider"></div>

      <!-- Action Row -->
      <div class="action-row">
        <!-- Record Button -->
        <button class="btn-record" id="btnRecord">
          <div class="rec-dot-indicator"></div>
          <span class="btn-record-text">RECORD</span>
        </button>

        <!-- Snap Button -->
        <button class="btn-icon" id="btnSnap" title="Capture screenshot">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/>
            <circle cx="6" cy="18" r="3"/><path d="M14.8 14.8 18 18"/>
          </svg>
        </button>

        <!-- Share Button -->
        <button class="btn-icon" id="btnShare" title="Share latest">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>

        <!-- Divider -->
        <div class="action-divider"></div>

        <!-- Open App Button -->
        <button class="btn-open" id="btnOpenApp" title="Open Show app">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </button>
      </div>

      <!-- Snap Options (hidden by default) -->
      <div class="snap-options hidden" id="snapOptions">
        <button class="snap-option" data-mode="region">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/>
            <circle cx="6" cy="18" r="3"/><path d="M14.8 14.8 18 18"/>
          </svg>
          <span>Region</span>
        </button>
        <button class="snap-option" data-mode="fullscreen">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <span>Full</span>
        </button>
        <button class="snap-option" data-mode="scrolling">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="2" width="8" height="4" rx="1"/>
            <path d="M4 10V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4"/>
            <path d="M2 14h4"/><path d="M4 12v4"/>
          </svg>
          <span>Stitch</span>
        </button>
      </div>

      <!-- Recording Timer Bar (hidden by default) -->
      <div class="recording-bar hidden" id="recordingBar">
        <div class="rec-pulse">
          <div class="rec-pulse-dot"></div>
        </div>
        <span class="rec-timer" id="recTimer">0:00</span>
        <button class="btn-stop" id="btnStopRec">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
          Stop
        </button>
      </div>
    </div>

    <!-- Recent Captures Section -->
    <div class="recent-section">
      <div class="recent-header">
        <span class="recent-title">Recent</span>
        <span class="recent-count" id="recentCount"></span>
      </div>
      <div class="recent-list" id="recentList">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
              <circle cx="12" cy="13" r="3"/>
            </svg>
          </div>
          <span class="empty-title">No captures yet</span>
          <span class="empty-desc">Press ⌘+Shift+S to capture</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <div class="shortcut-hint">
        <kbd>⌘</kbd><kbd>⇧</kbd><kbd>S</kbd>
        <span>Quick capture</span>
      </div>
      <button class="btn-settings" id="btnSettings" title="Settings">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
